<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Number Guessing Game</title>
</head>
<body>
<h1>Number Guessing Game</h1>
<input type="text" id="guess" placeholder="Enter a number">
<button id="submit">Guess</button>
<pre id="output"></pre>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script>
async function main() {
  const pyodide = await loadPyodide();

  // Load the Python game
  const scriptSource = await fetch("script.py").then(r => r.text());
  await pyodide.runPythonAsync(`
import types, sys
module = types.ModuleType("script")
exec("""${scriptSource.replace(/\\/g,"\\\\").replace(/`/g,"\\`")}""", module.__dict__)
sys.modules["script"] = module
`);

  const runPython = (guess) => pyodide.runPython(`__import__('script').run(${JSON.stringify(guess)})`);

  const outputEl = document.getElementById("output");
  document.getElementById("submit").onclick = () => {
    const guess = document.getElementById("guess").value;
    const result = runPython(guess);
    outputEl.textContent = result;
  };
}

main();
</script>
</body>
</html>
