<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pyodide App with Password</title>
</head>
<body>
  <h2>Enter Password</h2>
  <input type="password" id="passwordInput" placeholder="Password">
  <button id="loginBtn">Login</button>
  <p id="status"></p>

  <div id="app" style="display:none;">
    <h2>Python Script Output</h2>
    <pre id="output"></pre>
  </div>

  <!-- Load Pyodide -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <script>
    let pyodide;

    async function initPyodide() {
      pyodide = await loadPyodide();
      // Load your Python script into Pyodide
      await pyodide.runPythonAsync(`
          from pyodide.http import pyfetch
          import asyncio

          async def load_file():
              response = await pyfetch("script.py")
              text = await response.string()
              with open("script.py", "w") as f:
                  f.write(text)

          asyncio.ensure_future(load_file())
      `);
    }

    initPyodide();

    const PASSWORD = "devteam"; // 🔑 your password

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const entered = document.getElementById("passwordInput").value;
      if (entered === PASSWORD) {
        document.getElementById("status").innerText = "Access granted!";
        document.getElementById("app").style.display = "block";

        // Run your Python script
        await pyodide.runPythonAsync("import script");
        let result = await pyodide.runPythonAsync("script.run()");
        document.getElementById("output").innerText = result;
      } else {
        document.getElementById("status").innerText = "Wrong password.";
      }
    });
  </script>
</body>
</html>
