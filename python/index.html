<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Password Protected Game</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { font-family: Arial,sans-serif; padding:20px; max-width:600px; }
    .hidden { display:none; }
    pre { background:#f4f4f4; padding:10px; border-radius:6px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <h1>Number Guessing Game</h1>
  <label> Password: <input id="pw" type="password" autocomplete="current-password"></label>
  <button id="unlock">Unlock & Play</button>
  <p id="status">Status: idle</p>

  <div id="app" class="hidden">
    <h2>Game Output</h2>
    <pre id="output"></pre>
  </div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <script>
    const passwordRequired = "devteam"; // your password
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");
    const appDiv = document.getElementById("app");

    document.getElementById("unlock").addEventListener("click", async () => {
      const pw = document.getElementById("pw").value;
      if (pw !== passwordRequired) {
        statusEl.textContent = "Wrong password!";
        return;
      }
      statusEl.textContent = "Password correct, loading Pyodide...";
      try {
        const pyodide = await loadPyodide();

        // Define the game script in Pyodide
        const scriptCode = `
import random

def run():
    secret_number = random.randint(1, 100)
    attempts = 0
    output = []
    while True:
        guess_str = __import__("js").prompt("Guess a number between 1 and 100:")
        if guess_str is None:
            output.append("Game cancelled.")
            break
        try:
            guess = int(guess_str)
            attempts += 1
            if guess < secret_number:
                output.append("Too low! Try again.")
            elif guess > secret_number:
                output.append("Too high! Try again.")
            else:
                output.append(f"Congratulations! You guessed the number in {attempts} attempts.")
                break
        except ValueError:
            output.append("Invalid input. Please enter a number.")
    return "\\n".join(output)
`;

        // Load script as a module
        await pyodide.runPythonAsync(`
import types, sys
module = types.ModuleType("script")
exec("""${scriptCode}""", module.__dict__)
sys.modules["script"] = module
        `);

        statusEl.textContent = "Running game...";
        const result = await pyodide.runPythonAsync(`__import__("script").run()`);
        outputEl.textContent = String(result);
        appDiv.classList.remove("hidden");
        statusEl.textContent = "Game finished!";
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error: " + (err.message||err);
      }
    });
  </script>
</body>
</html>
